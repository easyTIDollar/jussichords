name: Build & Release jussichords APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Validate tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(grep 'versionName = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          echo "Tag version: ${TAG_VERSION}"
          echo "App version: ${APP_VERSION}"
          if [ -z "$APP_VERSION" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version does not match app versionName"
            exit 1
          fi

      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Prepare debug artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk "artifacts/jussichords-debug-${GITHUB_SHA::7}.apk"

      - name: Prepare release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk "artifacts/jussichords-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jussichords-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release and upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/jussichords-${{ github.ref_name }}.apk
          name: jussichords ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
