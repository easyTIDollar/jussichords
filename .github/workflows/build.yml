name: Build & Release jussichords APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(grep 'versionName = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          echo "Tag version: ${TAG_VERSION}"
          echo "App version: ${APP_VERSION}"
          if [ -z "$APP_VERSION" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version does not match app versionName"
            exit 1
          fi

      - name: Grant Gradle execute permission
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Normalize APK filename
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/jussichords-${{ github.ref_name }}.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/jussichords-${{ github.ref_name }}.apk
          name: jussichords ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
