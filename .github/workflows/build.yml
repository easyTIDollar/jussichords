name: Build & Release jussichords APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate tag matches app version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            echo "Skip version check for ${GITHUB_EVENT_NAME}"
            exit 0
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          APP_VERSION=$(grep 'versionName = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')

          echo "Tag version: ${TAG_VERSION}"
          echo "App version: ${APP_VERSION}"

          if [ -z "$APP_VERSION" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version does not match app versionName"
            exit 1
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Normalize APK filename
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "No APK found in app/build/outputs/apk/release"
            exit 1
          fi

          TARGET_NAME="jussichords-${{ github.ref_name }}.apk"

          mv "$APK_PATH" "app/build/outputs/apk/release/$TARGET_NAME"

          echo "Renamed APK to:"
          echo "$TARGET_NAME"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/jussichords-${{ github.ref_name }}.apk
          name: jussichords ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
