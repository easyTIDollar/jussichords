name: Build & Release jussichords APK
on:  
  push:    
    tags:      
      - 'v*'  
  workflow_dispatch:

jobs:  
  build-and-release:    
    runs-on: ubuntu-latest    
    permissions:      
      contents: write    
    steps:      
      # 拉取仓库      
      - name: Checkout repository        
        uses: actions/checkout@v4      

      # 安装 Java (已移除冲突的 cache: gradle)
      - name: Set up Java 17        
        uses: actions/setup-java@v4        
        with:          
          distribution: temurin          
          java-version: "17"          

      # 安装 Android SDK      
      - name: Set up Android SDK        
        uses: android-actions/setup-android@v3      

      # 安装 Android 平台工具      
      - name: Install Android SDK packages        
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"    

      # 配置 local.properties      
      - name: Configure Android SDK path        
        run: |          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties      

      # 修复 Linux 无执行权限      
      - name: Grant execute permission for gradlew        
        run: chmod +x gradlew      

      # 验证 wrapper 是否损坏      
      - name: Validate Gradle Wrapper        
        uses: gradle/wrapper-validation-action@v2      

      # 安装 Gradle (完美处理缓存)      
      - name: Setup Gradle        
        uses: gradle/actions/setup-gradle@v4        
        with:          
          gradle-version: 8.7      

      # 检查 tag 和 versionName 是否一致      
      - name: Validate tag matches app version        
        shell: bash        
        run: |          
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then            
            echo "Skip version check"            
            exit 0          
          fi          
          TAG_VERSION="${GITHUB_REF_NAME#v}"          
          APP_VERSION=$(grep 'versionName = ' app/build.gradle.kts \          
          | head -n 1 \          
          | sed -E 's/.*versionName = "([^"]+)".*/\1/')          
          echo "Tag version: $TAG_VERSION"          
          echo "App version: $APP_VERSION"          
          if [ -z "$APP_VERSION" ]; then            
            echo "Cannot find versionName"            
            exit 1          
          fi          
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then            
            echo "Tag version does not match app version"            
            exit 1          
          fi      

      # 构建 APK      
      - name: Build release APK        
        run: |          
          ./gradlew assembleRelease \          
          --stacktrace \          
          --no-daemon      

      # 重命名 APK      
      - name: Rename APK        
        run: |          
          APK=$(find app/build/outputs/apk/release \          
          -name "*.apk" | head -n 1)          
          if [ -z "$APK" ]; then            
            echo "APK not found"            
            exit 1          
          fi          
          TARGET="jussichords-${{ github.ref_name }}.apk"          
          mv "$APK" \          
          "app/build/outputs/apk/release/$TARGET"          
          echo "Generated:"          
          echo "$TARGET"      

      # 创建 GitHub Release      
      - name: Create GitHub Release        
        uses: softprops/action-gh-release@v2        
        with:          
          tag_name: ${{ github.ref_name }}          
          files: app/build/outputs/apk/release/jussichords-${{ github.ref_name }}.apk          
          name: jussichords-${{ github.ref_name }}          
          generate_release_notes: true          
          draft: false          
          prerelease: false
